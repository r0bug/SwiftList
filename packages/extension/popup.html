<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>swiftlist</title>
    <style>
      body {
        font-family: -apple-system, system-ui, sans-serif;
        width: 340px;
        margin: 0;
        padding: 0;
        color: #eee;
        background: #181818;
      }
      header { padding: 12px 14px 8px; display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
      header h1 { font-size: 15px; margin: 0; }
      .sublink { color: #6af; font-size: 11px; text-decoration: none; }
      .sublink:hover { text-decoration: underline; }
      #scan-section { padding: 8px 14px; border-top: 1px solid #2a2a2a; }
      .scan-row { display: flex; align-items: center; gap: 8px; }
      .scan-row button { background: #2a2a2a; color: #eee; border: 1px solid #3a3a3a; border-radius: 3px; padding: 4px 10px; font-size: 12px; cursor: pointer; }
      .scan-row button:hover { background: #333; border-color: #555; }
      .scan-row button:disabled { opacity: 0.5; cursor: not-allowed; }
      .folder { font-size: 11px; color: #888; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
      .progress-wrap { margin-top: 6px; display: none; }
      .progress-wrap.visible { display: block; }
      .progress-bar { height: 6px; background: #222; border-radius: 3px; overflow: hidden; }
      .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #4a8, #6af); transition: width 0.3s ease; }
      .progress-text { font-size: 11px; color: #aaa; margin-top: 4px; }
      .progress-text .err { color: #f66; }
      .progress-text .ok { color: #6c6; }
      .status { font-size: 12px; }
      .status.ok { color: #6c6; }
      .status.err { color: #f66; }
      .status.warn { color: #ea4; }
      .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
      .dot.ok { background: #6c6; }
      .dot.err { background: #f66; }
      .dot.warn { background: #ea4; }
      nav { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; padding: 0 10px 8px; }
      nav button {
        background: #2a2a2a; color: #eee; border: 1px solid #3a3a3a;
        border-radius: 4px; padding: 6px 4px; font-size: 11px; cursor: pointer;
      }
      nav button:hover { background: #333; border-color: #555; }
      section { border-top: 1px solid #2a2a2a; padding: 10px 14px; }
      section h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; color: #999; margin: 0 0 6px; }
      .row { padding: 6px 0; border-top: 1px dashed #2a2a2a; display: flex; justify-content: space-between; align-items: center; gap: 6px; }
      .row:first-child { border-top: 0; }
      .row .t { font-size: 12px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .row button { background: #2a2a2a; color: #eee; border: 1px solid #444; border-radius: 3px; padding: 3px 8px; cursor: pointer; font-size: 11px; white-space: nowrap; }
      .row button:hover { background: #333; }
      .empty { color: #666; font-style: italic; font-size: 12px; padding: 6px 0; }
      form.config { display: none; }
      form.config.visible { display: block; }
      form.config label { display: block; font-size: 11px; color: #aaa; margin-top: 8px; }
      form.config input { width: 100%; padding: 5px 7px; box-sizing: border-box; background: #222; color: #eee; border: 1px solid #3a3a3a; border-radius: 3px; margin-top: 3px; font-size: 12px; }
      form.config .actions { display: flex; gap: 6px; margin-top: 10px; align-items: center; }
      form.config button[type=submit] { background: #4a8; color: #111; border: 0; border-radius: 3px; padding: 6px 12px; font-size: 12px; font-weight: 600; cursor: pointer; }
      form.config button.ghost { background: transparent; color: #999; border: 0; padding: 4px 6px; font-size: 11px; cursor: pointer; text-decoration: underline; }
      form.config .msg { font-size: 11px; margin-left: auto; }
      .toggle { background: none; border: 0; color: #6af; font-size: 11px; cursor: pointer; padding: 0; }
    </style>
  </head>
  <body>
    <header>
      <div>
        <h1>swiftlist</h1>
        <a href="#" id="open-webui" class="sublink">Open web UI →</a>
      </div>
      <span id="status" class="status"><span class="dot"></span><span id="status-text">Checking…</span></span>
    </header>

    <nav id="nav">
      <button data-path="/">Items</button>
      <button data-path="/pool">Pool</button>
      <button data-path="/drafts">Drafts</button>
      <button data-path="/devices">Devices</button>
      <button data-path="/settings">Settings</button>
      <button id="toggle-config">Config</button>
    </nav>

    <section id="scan-section">
      <div class="scan-row">
        <button id="scan-btn">Scan inbox</button>
        <span id="scan-folder" class="folder" title=""></span>
      </div>
      <div class="progress-wrap" id="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
        <div class="progress-text" id="progress-text"></div>
      </div>
    </section>

    <section>
      <form class="config" id="config">
        <label>API base URL
          <input id="baseUrl" placeholder="http://localhost:3004" />
        </label>
        <label>API key
          <input id="apiKey" type="password" placeholder="sl_..." />
        </label>
        <label>Web UI URL
          <input id="webUrl" placeholder="http://localhost:5173" />
        </label>
        <div class="actions">
          <button type="submit">Save &amp; test</button>
          <button type="button" class="ghost" id="reset-defaults">Reset to bundled</button>
          <span id="config-msg" class="msg"></span>
        </div>
      </form>
    </section>

    <section id="needs-comps-section">
      <h2>Items needing sold comps</h2>
      <div id="needs-comps" class="empty">…</div>
    </section>

    <script src="defaults.js"></script>
    <script src="lib/api.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
