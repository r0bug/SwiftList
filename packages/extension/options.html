<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>swiftlist options</title>
    <style>
      body { font-family: -apple-system, system-ui, sans-serif; max-width: 480px; margin: 24px auto; padding: 0 16px; color: #eee; background: #181818; }
      label { display: block; font-size: 12px; color: #aaa; margin-top: 12px; }
      input { width: 100%; padding: 6px 8px; box-sizing: border-box; background: #222; color: #eee; border: 1px solid #444; border-radius: 3px; margin-top: 4px; }
      button { margin-top: 16px; padding: 8px 16px; background: #4a8; color: #000; border: 0; border-radius: 3px; cursor: pointer; font-weight: 600; }
      .ok { color: #6c6; margin-top: 8px; font-size: 12px; }
      .err { color: #f66; margin-top: 8px; font-size: 12px; }
    </style>
  </head>
  <body>
    <h1>swiftlist</h1>
    <label>API base URL
      <input id="baseUrl" placeholder="http://localhost:3004" />
    </label>
    <label>API key
      <input id="apiKey" type="password" placeholder="sl_..." />
    </label>
    <label>Web UI URL
      <input id="webUrl" placeholder="http://localhost:5173" />
    </label>
    <label>Machine ID (read only)
      <input id="machineId" disabled />
    </label>
    <button id="save">Save & test</button>
    <div id="msg"></div>
    <script src="defaults.js"></script>
    <script src="lib/api.js"></script>
    <script src="options.js"></script>
  </body>
</html>
